<!DOCTYPE html>
<html>
<head>

<title>Sales Report</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

<h2>Record Sale</h2>

<form method="POST">

<select name="product_id">

{% for product in products %}

<option value="{{ product.id }}">
{{ product.name }}
</option>

{% endfor %}

</select>

<input type="number" name="quantity_sold" placeholder="Quantity Sold">

<button type="submit">Record Sale</button>

</form>

<h2>Sales Report</h2>

<table>

<tr>

<th>Product</th>

<th>Quantity Sold</th>

<th>Total</th>

</tr>

{% for sale in sales %}

<tr>

<td>{{ sale.product_name }}</td>

<td>{{ sale.quantity_sold }}</td>

<td>R{{ sale.total_price }}</td>

</tr>

{% endfor %}

</table>

</div>

</body>
</html>
